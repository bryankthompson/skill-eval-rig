name: tests
on:
  push:
  pull_request:

# Runs the scorer/prefill self-tests against committed fixtures. No live `claude` — the
# instrument behind every published number is regression-tested on every push (M13/H6).
jobs:
  self-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: scorer + prefill self-tests
        run: make test
